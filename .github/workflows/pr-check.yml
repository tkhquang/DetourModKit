name: PR Check - Tests & Coverage

on:
  pull_request:
    branches: [main]
    paths:
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - 'external/**'
      - 'include/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/pr-check.yml'

  workflow_dispatch:

# Least-privilege token: this workflow only builds, tests, and uploads a coverage artifact. Artifact upload uses the
# Actions runtime token, not the GITHUB_TOKEN contents scope, so read-only contents is sufficient and no job needs
# write. Declaring the block also drops every other default scope to none.
permissions:
  contents: read

env:
  # Pin the exact GCC the release workflow ships with (Chocolatey MinGW 13.2.0) so the coverage/PR gate and the
  # released artifact compile with one toolchain instead of the runner's unversioned C:\mingw64.
  MINGW_BIN: C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin

jobs:
  build-test:
    name: Build, Test & Coverage
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Cache MinGW
        id: cache-mingw
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: C:\ProgramData\chocolatey\lib\mingw
          key: ${{ runner.os }}-mingw-13.2.0-v2

      - name: Install MinGW (if not cached)
        if: steps.cache-mingw.outputs.cache-hit != 'true'
        run: choco install mingw --version=13.2.0 --yes --force --no-progress
        shell: powershell

      - name: Add MinGW to PATH
        run: echo "${{ env.MINGW_BIN }}" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Cache pip packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-gcovr-${{ runner.os }}
          restore-keys: pip-gcovr-

      - name: Install gcovr
        run: pip install gcovr
        shell: powershell

      - name: Cache CMake build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/mingw-debug
          # Exact-key only -- deliberately NO restore-keys. The key hashes every source file, so a cache hit means the
          # build dir was instrumented from byte-identical sources. A prefix restore-key would instead reuse a build
          # dir built from a DIFFERENT source set, and ninja never purges the orphaned .gcno/.gcda of since-deleted
          # sources; gcovr then reads stale coverage notes for removed files (e.g. src/scan.cpp, src/memory.cpp) and
          # aborts on a function-line merge conflict (the same inline scan::Pattern member reported at two different
          # line numbers across builds). A changed source set therefore starts from a clean build dir, while an
          # identical-commit re-run still hits the exact key. The `v2` epoch invalidates every pre-existing cache
          # entry (the failing run saved a poisoned build dir under the old key, since cache save runs in the post-step
          # even on failure); bump it again if a future change ever needs to discard all cached build dirs wholesale.
          # The workflow file itself is hashed so a change to the build inputs that live HERE rather than in the
          # sources -- the pinned MinGW version (the `mingw-13.2.0` literal) and the configure flags passed on the
          # command line (-DDMK_ENABLE_COVERAGE / -DDMK_WARNINGS_AS_ERRORS, neither of which is in CMakePresets.json) --
          # also invalidates the key, so a toolchain bump or a flag flip never restores a build dir whose
          # CMakeCache.txt embeds the old toolchain/flags.
          key: cmake-build-v2-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'external/**', 'src/**', 'include/**', 'tests/**', '.github/workflows/pr-check.yml') }}

      - name: Verify Tools
        run: |
          echo "--- gcc ---" && gcc --version
          echo "--- g++ ---" && g++ --version
          echo "--- ninja ---" && ninja --version
          echo "--- cmake ---" && cmake --version
          echo "--- gcovr ---" && gcovr --version
          # Surface the resolved toolchain in the job summary so the gate's GCC is visible without opening the log.
          echo "### Toolchain" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          gcc --version | head -1 >> "$GITHUB_STEP_SUMMARY"
          g++ --version | head -1 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Configure (Debug + Tests + Coverage)
        run: cmake --preset mingw-debug -DDMK_ENABLE_COVERAGE=ON -DDMK_WARNINGS_AS_ERRORS=ON
        shell: bash

      - name: Build
        run: cmake --build --preset mingw-debug --parallel
        shell: bash

      - name: Copy MinGW runtime DLLs
        run: |
          $testDir = "build\mingw-debug\tests"
          # Resolve the runtime DLLs from the g++ that actually built the tests (off PATH) rather than a hard-coded
          # Chocolatey subpath, whose bin layout varies by package version and may not exist on the runner image.
          $mingwBin = Split-Path -Parent (Get-Command g++).Source
          Get-ChildItem "$mingwBin\lib*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName "$testDir\"
          }
        shell: powershell

      - name: Run Tests
        # Run through CTest so each test case executes in its own process. The
        # monolithic single-process run shares every singleton and file-scope static
        # across suites, which lets one suite's teardown contaminate the next (for
        # example a Bootstrap lifecycle worker still inside DMK_Shutdown when the next
        # Bootstrap suite starts hooking). Per-process isolation matches the release
        # and MSVC jobs and removes that class of flake. Coverage .gcda data still
        # accumulates across the per-test processes for the gcovr step below.
        timeout-minutes: 12
        run: ctest --preset mingw-debug
        shell: bash

      - name: Generate Coverage Report
        run: |
          gcovr \
            --root . \
            --filter "src/" \
            --filter "include/" \
            --exclude "external/" \
            --exclude "build/" \
            --exclude "tests/" \
            --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            --print-summary \
            --xml coverage.xml \
            build/mingw-debug
        shell: bash

      - name: Check Coverage Threshold (80%)
        run: |
          LINE_RATE=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0))
          print(f'{rate * 100:.2f}')
          ")
          echo "Line coverage: ${LINE_RATE}%"
          python -c "
          rate = float('${LINE_RATE}')
          if rate < 80.0:
              print(f'FAIL: Coverage {rate:.2f}% is below 80% threshold')
              exit(1)
          else:
              print(f'PASS: Coverage {rate:.2f}% meets 80% threshold')
          "
        shell: bash

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml

  # MSVC is the primary shipping toolchain and differs from MinGW in exception handling, /W4 diagnostics, and STL
  # internals. Keep the pull-request gate symmetric so both toolchains compile and run the same debug test preset.
  msvc-build-test:
    name: MSVC Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Set up MSVC developer environment
        # SHA-pinned action that puts cl and the MSVC toolchain on PATH. windows-latest already provides Ninja and
        # CMake.
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: Verify Tools
        run: |
          echo "--- cl ---" && cl 2>&1 | head -1
          echo "--- cmake ---" && cmake --version
          echo "--- ninja ---" && ninja --version
        shell: bash

      - name: Configure (MSVC Debug + Tests, warnings as errors)
        # /WX is part of the blocking gate, and configure runs the source-manifest cross-check.
        run: cmake --preset msvc-debug -DDMK_WARNINGS_AS_ERRORS=ON
        shell: cmd

      - name: Build
        # Cap cl fan-out to avoid C1060 heap exhaustion on the hosted runner.
        run: cmake --build --preset msvc-debug --parallel 2
        shell: cmd

      - name: Run Tests
        # Per-process isolation via CTest, same rationale as the MinGW leg above.
        timeout-minutes: 15
        run: ctest --preset msvc-debug
        shell: cmd
