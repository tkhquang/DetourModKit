name: AVX-512 Scanner Tier

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_throughput_gate:
        description: "Run the >= 30% throughput gate on a self-hosted AVX-512 runner"
        type: boolean
        default: false

# Read-only token: this workflow never writes to the repo.
permissions:
  contents: read

# Evaluation of the opt-in AVX-512 scanner verify tier (the DMK_ENABLE_AVX512 build option). Per-tier correctness
# (that every SIMD tier produces identical results) lives in simd-tier-correctness.yml; this workflow answers the
# narrower question of whether the AVX-512 tier is worth enabling. Both jobs are slow and advisory, so they run
# post-merge on push to main and on manual dispatch, not on pull requests. Two jobs:
#
#   verify-icount-proxy -- a no-AVX-512-hardware signal. SDE cannot measure wall-clock (the throughput-gate does that
#     on real silicon), but it counts executed instructions deterministically. It runs the bench's --verify-icount
#     mode under SDE -spr (AVX-512) and -hsw (AVX2) and reports the ratio of executed instructions. A proxy for work
#     performed, not throughput, so it is advisory and never gates.
#
#   throughput-gate -- the ">= 30% verify-throughput gain on an AVX-512F host" half of the gate. SDE timing is not
#     representative of real silicon, so this can only be measured on a real AVX-512 CPU; GitHub-hosted runners do not
#     reliably provide one. It is therefore dispatch-only and targets a self-hosted runner labelled
#     [self-hosted, avx512] that the maintainer attaches. It builds the scanner bench with the tier ON and OFF, runs
#     the verify scenario on both, and fails if the AVX-512 build is not at least 1.30x the AVX2 build.

jobs:
  verify-icount-proxy:
    name: AVX-512 verify instruction-count proxy (Intel SDE, advisory)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Set up MSVC (x64)
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: Build scanner bench (Release, AVX-512 tier ON)
        shell: pwsh
        run: |
          cmake -S . -B build/icount -G Ninja -DCMAKE_BUILD_TYPE=Release `
            -DDMK_BUILD_BENCHMARKS=ON -DDMK_BUILD_TESTS=OFF -DDMK_ENABLE_AVX512=ON
          cmake --build build/icount --target DetourModKit_bench_scanner --parallel 3

      - name: Set up Intel SDE
        uses: petarpetrovt/setup-sde@31aa4a8e85e109bef00f1d838613fcc6ec421271 # v5.0
        continue-on-error: true
        with:
          # SDE 10.8.0 has an install-folder startup bug (the runner's extraction path triggers it), so pin a
          # known-good earlier release; -spr / -hsw CPU emulation is available in 9.x.
          # Ref: https://community.intel.com/t5/Intel-ISA-Extensions/SDE-10-8-fails-to-start-depending-on-the-installation-folder/m-p/1746386
          sdeVersion: 9.58.0
          environmentVariableName: SDE_PATH

      - name: Compare AVX-512 vs AVX2 verify instruction counts under Intel SDE
        shell: pwsh
        run: |
          # The same AVX-512-enabled binary selects its verify tier from the emulated CPU, so running it under -spr
          # (Sapphire Rapids -> AVX-512 tier) vs -hsw (Haswell -> AVX2 tier) and counting executed instructions via
          # SDE -mix shows the AVX-512 body doing less work for the same verify pass. This is a hardware-independent
          # proxy for work performed -- NOT wall-clock throughput (the throughput-gate job measures that on real
          # silicon, where zmm downclock and port pressure can offset a lower instruction count).
          $sdeExe = @('sde64.exe', 'sde.exe') |
                    ForEach-Object { Join-Path "$env:SDE_PATH" $_ } |
                    Where-Object { Test-Path $_ } |
                    Select-Object -First 1
          if (-not $sdeExe)
          {
              Write-Output "::warning::Intel SDE not available; skipping the instruction-count proxy."
              exit 0
          }
          $exe = (Get-ChildItem -Recurse -Path build/icount -Filter DetourModKit_bench_scanner.exe |
                  Select-Object -First 1).FullName
          if (-not $exe) { throw "DetourModKit_bench_scanner.exe not found" }

          function Get-VerifyIcount([string] $chip)
          {
              $outDir = Join-Path $env:RUNNER_TEMP "mix-$chip"
              Remove-Item -Recurse -Force $outDir -ErrorAction SilentlyContinue
              New-Item -ItemType Directory -Force -Path $outDir | Out-Null
              Push-Location $outDir
              try { $progOut = & "$sdeExe" "-$chip" -mix -- "$exe" --verify-icount }
              finally { Pop-Location }

              $gate = $progOut | Select-String '^#GATE' | Select-Object -First 1
              if ($gate) { Write-Host ("[-$chip] bench verify tier: {0}" -f (($gate.Line -split "`t")[-1])) }

              $mixFile = Get-ChildItem -Path $outDir -Filter 'sde-mix-out.txt' -Recurse -ErrorAction SilentlyContinue |
                         Select-Object -First 1
              if (-not $mixFile)
              {
                  Write-Output "::warning::no sde-mix-out.txt produced for -$chip; skipping the proxy."
                  return $null
              }
              $total = Get-Content $mixFile.FullName |
                       ForEach-Object { if ($_ -match '^\*total\s+(\d+)') { [int64]$Matches[1] } } |
                       Sort-Object -Descending | Select-Object -First 1
              if (-not $total)
              {
                  Write-Output "::warning::could not parse a *total instruction count for -$chip."
                  Get-Content $mixFile.FullName | Select-String -Pattern 'total' |
                      Select-Object -First 5 | ForEach-Object { Write-Output "::notice::mix: $($_.Line.Trim())" }
                  return $null
              }
              return $total
          }

          $avx512 = Get-VerifyIcount "spr"
          $avx2 = Get-VerifyIcount "hsw"
          if (($null -eq $avx512) -or ($null -eq $avx2)) { exit 0 }

          Write-Host ("AVX-512 (-spr) verify-pass instructions: {0:N0}" -f $avx512)
          Write-Host ("AVX2    (-hsw) verify-pass instructions: {0:N0}" -f $avx2)
          if ($avx512 -gt 0)
          {
              $ratio = [double]$avx2 / [double]$avx512
              Write-Host ("instruction-count ratio (AVX2 / AVX-512): {0:F3}x" -f $ratio)
              Write-Host "NOTE: proxy for work performed, not wall-clock throughput (see throughput-gate)."
          }

  throughput-gate:
    name: AVX-512 throughput gate (>= 30%, self-hosted)
    # Dispatch-only, and only when explicitly requested. Requires a self-hosted Windows runner with an AVX-512F +
    # AVX-512BW CPU, labelled [self-hosted, avx512], with Visual Studio (MSVC), Ninja, and CMake available.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_throughput_gate }}
    runs-on: [self-hosted, avx512]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Set up MSVC (x64)
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: Build scanner bench (AVX-512 tier ON)
        shell: pwsh
        run: |
          cmake -S . -B build/avx512-on -G Ninja -DCMAKE_BUILD_TYPE=Release `
            -DDMK_BUILD_BENCHMARKS=ON -DDMK_BUILD_TESTS=OFF -DDMK_ENABLE_AVX512=ON
          cmake --build build/avx512-on --target DetourModKit_bench_scanner --parallel 3

      - name: Build scanner bench (AVX2 baseline, AVX-512 tier OFF)
        shell: pwsh
        run: |
          cmake -S . -B build/avx512-off -G Ninja -DCMAKE_BUILD_TYPE=Release `
            -DDMK_BUILD_BENCHMARKS=ON -DDMK_BUILD_TESTS=OFF -DDMK_ENABLE_AVX512=OFF
          cmake --build build/avx512-off --target DetourModKit_bench_scanner --parallel 3

      - name: Run verify bench on both builds and gate at 1.30x
        shell: pwsh
        run: |
          function Get-VerifyThroughput([string] $exe) {
            $gateLine = & $exe | Where-Object { $_ -like "#GATE`tverify_gib_per_s`t*" } | Select-Object -First 1
            if (-not $gateLine) {
              throw "Missing #GATE verify_gib_per_s line from $exe"
            }

            $fields = $gateLine -split "`t"
            if ($fields.Count -lt 3) {
              throw "Malformed #GATE line from $exe: $gateLine"
            }

            return [double]::Parse($fields[2], [System.Globalization.CultureInfo]::InvariantCulture)
          }

          $on = Get-VerifyThroughput ".\build\avx512-on\tests\DetourModKit_bench_scanner.exe"
          $off = Get-VerifyThroughput ".\build\avx512-off\tests\DetourModKit_bench_scanner.exe"
          if ($off -le 0.0) {
            throw "AVX2 baseline throughput must be positive"
          }

          $ratio = $on / $off
          Write-Host ("AVX-512 build verify throughput: {0:F4} GiB/s" -f $on)
          Write-Host ("AVX2   build verify throughput: {0:F4} GiB/s" -f $off)
          Write-Host ("ratio (AVX-512 / AVX2): {0:F4}x  (gate: >= 1.30x)" -f $ratio)
          if ($ratio -lt 1.30) {
            throw "AVX-512 verify throughput gate failed"
          }
