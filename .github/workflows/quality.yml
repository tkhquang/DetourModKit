name: Quality Probes

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Read-only token: this advisory workflow never writes to the repo.
permissions:
  contents: read

# Mostly advisory. The format-check and clang-tidy jobs verify the tracked project sources stay formatted against the
# root .clang-format (clang-format 20, pinned below) and follow the comment-marker conventions; they never gate a PR.
# The header-encapsulation-hygiene job is the exception: it is a correctness gate and DOES block merge. Runs on pull
# requests so issues are caught before merge, and on manual dispatch. The build/test/coverage gate lives in
# pr-check.yml; the slower AddressSanitizer probe runs post-merge in sanitizers.yml.

jobs:
  format-check:
    name: clang-format (advisory)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install clang-format
        run: pip install "clang-format==20.*"
        shell: bash

      - name: Check formatting (dry run, project sources only)
        run: |
          # git ls-files lists only this repo's tracked files, so submodule
          # sources under external/ are never formatted.
          git ls-files '*.cpp' '*.hpp' | xargs clang-format --dry-run --Werror
        shell: bash

      - name: Check comment-marker conventions
        # Runs even if the formatting step above reported violations.
        if: ${{ !cancelled() }}
        run: python scripts/check_comment_style.py
        shell: bash

  header-hygiene:
    name: header-encapsulation hygiene (blocking)
    runs-on: windows-latest
    # NOT advisory: unlike the formatting probes above, the encapsulation invariants are a correctness contract. A
    # public header that re-includes the SafetyHook backend, a hook::MidContext definition, or an async-logger internal
    # leaking onto the documented surface must FAIL the PR, so this job carries no continue-on-error.
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check header-encapsulation hygiene
        run: python scripts/check_header_hygiene.py
        shell: bash

  clang-tidy:
    name: clang-tidy (advisory)
    runs-on: windows-latest
    # Advisory like format-check: clang-tidy findings never gate a PR. The curated .clang-tidy keeps WarningsAsErrors
    # empty, and this job is continue-on-error, so a finding -- or a toolchain hiccup in clang-tidy's header detection --
    # is surfaced without blocking merge. The blocking build/test gate lives in pr-check.yml.
    continue-on-error: true
    env:
      MINGW_BIN: C:\mingw64\bin
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Add MinGW to PATH
        run: echo "${{ env.MINGW_BIN }}" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Install clang-tidy
        # Pinned to the clang-tidy major the .clang-tidy profile targets, matching the clang-format pin above.
        run: pip install "clang-tidy==20.*"
        shell: bash

      - name: Configure (clang-tidy launcher, library only)
        # DMK_ENABLE_CLANG_TIDY wires the curated advisory .clang-tidy into the build via CMAKE_CXX_CLANG_TIDY and
        # exports compile_commands.json. Tests are off so only the library's own sources are analysed.
        run: cmake --preset mingw-debug -DDMK_ENABLE_CLANG_TIDY=ON -DDMK_BUILD_TESTS=OFF
        shell: bash

      - name: Build with clang-tidy (advisory)
        # Building the library target runs clang-tidy alongside each compile; findings print to the log. WarningsAsErrors
        # stays '' so check findings are warnings only. clang-tidy's clang frontend can still emit a hard parse
        # diagnostic on a TU under a foreign toolchain layout, which stops the build, so this advisory lane swallows a
        # non-zero exit -- it surfaces findings without ever gating (the real build/test gate is pr-check.yml).
        run: cmake --build build/mingw-debug --target DetourModKit --parallel || true
        shell: bash
