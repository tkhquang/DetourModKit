name: Quality Probes

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Read-only token: this advisory workflow never writes to the repo.
permissions:
  contents: read

# Advisory, non-blocking. Verifies the tracked project sources stay formatted against the root .clang-format
# (clang-format 20, pinned below) and follow the comment-marker conventions. Runs on pull requests so style is caught
# before merge, and on manual dispatch. The blocking gate (build, tests, coverage) lives in pr-check.yml; the slower
# AddressSanitizer probe runs post-merge in sanitizers.yml.

jobs:
  format-check:
    name: clang-format (advisory)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install clang-format
        run: pip install "clang-format==20.*"
        shell: bash

      - name: Check formatting (dry run, project sources only)
        run: |
          # git ls-files lists only this repo's tracked files, so submodule
          # sources under external/ are never formatted.
          git ls-files '*.cpp' '*.hpp' | xargs clang-format --dry-run --Werror
        shell: bash

      - name: Check comment-marker conventions
        # Runs even if the formatting step above reported violations.
        if: ${{ !cancelled() }}
        run: python scripts/check_comment_style.py
        shell: bash

  clang-tidy:
    name: clang-tidy (advisory)
    runs-on: windows-latest
    # Advisory like format-check: clang-tidy findings never gate a PR. The curated .clang-tidy keeps WarningsAsErrors
    # empty, and this job is continue-on-error, so a finding -- or a toolchain hiccup in clang-tidy's header detection --
    # is surfaced without blocking merge. The blocking build/test gate lives in pr-check.yml.
    continue-on-error: true
    env:
      MINGW_BIN: C:\mingw64\bin
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Add MinGW to PATH
        run: echo "${{ env.MINGW_BIN }}" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Install clang-tidy
        # Pinned to the clang-tidy major the .clang-tidy profile targets, matching the clang-format pin above.
        run: pip install "clang-tidy==20.*"
        shell: bash

      - name: Configure (clang-tidy launcher, library only)
        # DMK_ENABLE_CLANG_TIDY wires the curated advisory .clang-tidy into the build via CMAKE_CXX_CLANG_TIDY and
        # exports compile_commands.json. Tests are off so only the library's own sources are analysed.
        run: cmake --preset mingw-debug -DDMK_ENABLE_CLANG_TIDY=ON -DDMK_BUILD_TESTS=OFF
        shell: bash

      - name: Build with clang-tidy (advisory)
        # Building the library target runs clang-tidy alongside each compile. WarningsAsErrors stays '' so findings are
        # warnings only; the job is continue-on-error so even a hard clang-tidy failure does not gate the PR.
        run: cmake --build build/mingw-debug --target DetourModKit --parallel
        shell: bash
