name: CI - Tests & Coverage

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (MinGW)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Add pre-installed MinGW to PATH
        run: echo "C:\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Install Ninja and gcovr
        run: |
          choco install ninja --yes --force --no-progress
          pip install gcovr
        shell: powershell

      - name: Verify Tools
        run: |
          echo "--- g++ ---" && g++ --version
          echo "--- ninja ---" && ninja --version
          echo "--- cmake ---" && cmake --version
          echo "--- gcovr ---" && gcovr --version
        shell: bash

      - name: Configure (Debug + Tests + Coverage)
        run: cmake --preset mingw-debug -DDMK_ENABLE_COVERAGE=ON -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
        shell: bash

      - name: Build
        run: cmake --build --preset mingw-debug --parallel
        shell: bash

  test:
    name: Tests (MinGW)
    runs-on: windows-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Add pre-installed MinGW to PATH
        run: echo "C:\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/mingw-debug
          key: cmake-build-${{ runner.os }}-v1-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'src/**', 'include/**') }}
          restore-keys: |
            cmake-build-${{ runner.os }}-v1-
            cmake-build-${{ runner.os }}-

      - name: Run Tests
        run: ctest --preset mingw-debug
        shell: bash

  coverage:
    name: Coverage Report (MinGW)
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Add pre-installed MinGW to PATH
        run: echo "C:\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-gcovr-${{ runner.os }}-v1
          restore-keys: |
            pip-gcovr-${{ runner.os }}-

      - name: Install gcovr
        run: pip install gcovr
        shell: powershell

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/mingw-debug
          key: cmake-build-${{ runner.os }}-v1-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'src/**', 'include/**') }}
          restore-keys: |
            cmake-build-${{ runner.os }}-v1-
            cmake-build-${{ runner.os }}-

      - name: Generate Coverage Report
        run: |
          gcovr \
            --root . \
            --filter "src/" \
            --filter "include/" \
            --exclude "external/" \
            --exclude "build/" \
            --exclude "tests/" \
            --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            --print-summary \
            --xml coverage.xml \
            build/mingw-debug
        shell: bash

      - name: Check Coverage Threshold (80%)
        run: |
          LINE_RATE=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0))
          print(f'{rate * 100:.2f}')
          ")
          echo "Line coverage: ${LINE_RATE}%"
          python -c "
          rate = float('${LINE_RATE}')
          if rate < 80.0:
              print(f'FAIL: Coverage {rate:.2f}% is below 80% threshold')
              exit(1)
          else:
              print(f'PASS: Coverage {rate:.2f}% meets 80% threshold')
          "
        shell: bash

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
