name: CI - Tests & Coverage

on:
  pull_request:
    branches: [main]

  workflow_dispatch:

jobs:
  setup:
    name: Setup Build Environment
    runs-on: windows-latest

    steps:
      - name: Verify MinGW available
        run: |
          echo "--- g++ ---" && g++ --version
          echo "--- MinGW path ---" && where g++
        shell: bash

      - name: Install Ninja
        run: choco install ninja --yes --force --no-progress
        shell: powershell

  build-test:
    name: Build, Test & Coverage
    runs-on: windows-latest
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Ninja
        run: choco install ninja --yes --force --no-progress
        shell: powershell

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-v2
          restore-keys: |
            pip-${{ runner.os }}-v2-
            pip-${{ runner.os }}-

      - name: Install gcovr
        run: pip install gcovr
        shell: powershell

      - name: Verify Tools
        run: |
          echo "--- g++ ---" && g++ --version
          echo "--- ninja ---" && ninja --version
          echo "--- cmake ---" && cmake --version
          echo "--- gcovr ---" && gcovr --version
        shell: bash

      - name: Locate MinGW and add to PATH
        run: |
          MINGW_DIR=$(dirname "$(which g++)")
          echo "MinGW bin dir: $MINGW_DIR"
          echo "$MINGW_DIR" >> "$GITHUB_PATH"
        shell: bash

      - name: Configure (Debug + Tests + Coverage)
        run: cmake --preset mingw-debug -DDMK_ENABLE_COVERAGE=ON
        shell: bash

      - name: Build
        run: cmake --build --preset mingw-debug --parallel
        shell: bash

      - name: Run Tests
        run: ctest --preset mingw-debug
        shell: bash

      - name: Generate Coverage Report
        run: |
          gcovr \
            --root . \
            --filter "src/" \
            --filter "include/" \
            --exclude "external/" \
            --exclude "build/" \
            --exclude "tests/" \
            --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            --print-summary \
            --xml coverage.xml \
            build/mingw-debug
        shell: bash

      - name: Check Coverage Threshold (80%)
        run: |
          LINE_RATE=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0))
          print(f'{rate * 100:.2f}')
          ")
          echo "Line coverage: ${LINE_RATE}%"
          python -c "
          rate = float('${LINE_RATE}')
          if rate < 80.0:
              print(f'FAIL: Coverage {rate:.2f}% is below 80% threshold')
              exit(1)
          else:
              print(f'PASS: Coverage {rate:.2f}% meets 80% threshold')
          "
        shell: bash

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
