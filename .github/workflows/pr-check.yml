name: PR Check - Tests & Coverage

on:
  pull_request:
    branches: [main]
    paths:
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - 'external/**'
      - 'include/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/pr-check.yml'

  workflow_dispatch:

# Least-privilege token: this workflow only builds, tests, and uploads a coverage artifact. Artifact upload uses the
# Actions runtime token, not the GITHUB_TOKEN contents scope, so read-only contents is sufficient and no job needs
# write. Declaring the block also drops every other default scope to none.
permissions:
  contents: read

env:
  # Pin the exact GCC the release workflow ships with (Chocolatey MinGW 13.2.0) so the coverage/PR gate and the
  # released artifact compile with one toolchain instead of the runner's unversioned C:\mingw64.
  MINGW_BIN: C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin

jobs:
  build-test:
    name: Build, Test & Coverage
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Cache MinGW
        id: cache-mingw
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: C:\ProgramData\chocolatey\lib\mingw
          key: ${{ runner.os }}-mingw-13.2.0-v2

      - name: Install MinGW (if not cached)
        if: steps.cache-mingw.outputs.cache-hit != 'true'
        run: choco install mingw --version=13.2.0 --yes --force --no-progress
        shell: powershell

      - name: Add MinGW to PATH
        run: echo "${{ env.MINGW_BIN }}" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Cache pip packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-gcovr-${{ runner.os }}
          restore-keys: pip-gcovr-

      - name: Install gcovr
        run: pip install gcovr
        shell: powershell

      - name: Cache CMake build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/mingw-debug
          # Exact-key only -- deliberately NO restore-keys. The key hashes every source file, so a cache hit means the
          # build dir was instrumented from byte-identical sources. A prefix restore-key would instead reuse a build
          # dir built from a DIFFERENT source set, and ninja never purges the orphaned .gcno/.gcda of since-deleted
          # sources; gcovr then reads stale coverage notes for removed files (e.g. src/scan.cpp, src/memory.cpp) and
          # aborts on a function-line merge conflict (the same inline scan::Pattern member reported at two different
          # line numbers across builds). A changed source set therefore starts from a clean build dir, while an
          # identical-commit re-run still hits the exact key. The `v2` epoch invalidates every pre-existing cache
          # entry (the failing run saved a poisoned build dir under the old key, since cache save runs in the post-step
          # even on failure); bump it again if a future change ever needs to discard all cached build dirs wholesale.
          # The workflow file itself is hashed so a change to the build inputs that live HERE rather than in the
          # sources -- the pinned MinGW version (the `mingw-13.2.0` literal) and the configure flags passed on the
          # command line (-DDMK_ENABLE_COVERAGE / -DDMK_WARNINGS_AS_ERRORS, neither of which is in CMakePresets.json) --
          # also invalidates the key, so a toolchain bump or a flag flip never restores a build dir whose
          # CMakeCache.txt embeds the old toolchain/flags.
          key: cmake-build-v2-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'scripts/**', 'external/**', 'src/**', 'include/**', 'tests/**', '.github/workflows/pr-check.yml') }}

      - name: Verify Tools
        run: |
          echo "--- gcc ---" && gcc --version
          echo "--- g++ ---" && g++ --version
          echo "--- ninja ---" && ninja --version
          echo "--- cmake ---" && cmake --version
          echo "--- gcovr ---" && gcovr --version
          # Surface the resolved toolchain in the job summary so the gate's GCC is visible without opening the log.
          echo "### Toolchain" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          gcc --version | head -1 >> "$GITHUB_STEP_SUMMARY"
          g++ --version | head -1 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Configure (Debug + Tests + Coverage)
        run: cmake --preset mingw-debug -DDMK_ENABLE_COVERAGE=ON -DDMK_WARNINGS_AS_ERRORS=ON
        shell: bash

      - name: Build
        run: cmake --build --preset mingw-debug --parallel 4
        shell: bash

      - name: Copy MinGW runtime DLLs
        run: |
          $testDir = "build\mingw-debug\tests"
          # Resolve the runtime DLLs from the g++ that actually built the tests (off PATH) rather than a hard-coded
          # Chocolatey subpath, whose bin layout varies by package version and may not exist on the runner image.
          $mingwBin = Split-Path -Parent (Get-Command g++).Source
          Get-ChildItem "$mingwBin\lib*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName "$testDir\"
          }
        shell: powershell

      - name: Run Tests
        # Run through CTest so each test case executes in its own process. The
        # monolithic single-process run shares every singleton and file-scope static
        # across suites, which lets one suite's teardown contaminate the next (for
        # example a Bootstrap lifecycle worker still inside DMK_Shutdown when the next
        # Bootstrap suite starts hooking). Per-process isolation matches the release
        # and MSVC jobs and removes that class of flake. Coverage .gcda data still
        # accumulates across the per-test processes for the gcovr step below.
        timeout-minutes: 12
        run: ctest --preset mingw-debug
        shell: bash

      - name: Generate Coverage Report
        run: |
          gcovr \
            --root . \
            --filter "src/" \
            --filter "include/" \
            --exclude "external/" \
            --exclude "build/" \
            --exclude "tests/" \
            --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            --print-summary \
            --xml coverage.xml \
            build/mingw-debug
        shell: bash

      - name: Check Coverage Threshold (80%)
        run: |
          LINE_RATE=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0))
          print(f'{rate * 100:.2f}')
          ")
          echo "Line coverage: ${LINE_RATE}%"
          python -c "
          rate = float('${LINE_RATE}')
          if rate < 80.0:
              print(f'FAIL: Coverage {rate:.2f}% is below 80% threshold')
              exit(1)
          else:
              print(f'PASS: Coverage {rate:.2f}% meets 80% threshold')
          "
        shell: bash

      - name: Build-Tree Consumer Proof (MinGW)
        # tests/package_build_tree consumes DetourModKit via add_subdirectory with tests OFF and asserts at
        # compile time that no backend include path, backend macro, NOMINMAX, or test-only STL pin reaches its
        # command line; its windows_macro_probe TU proves the public headers compile with windows.h's macro
        # surface, including active min/max macros on MSVC. Running the binary proves the $<LINK_ONLY:...>
        # backend archive chain still links.
        run: |
          cmake -S tests/package_build_tree -B build/package-build-tree-mingw -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ \
            -DDMK_WARNINGS_AS_ERRORS=ON
          cmake --build build/package-build-tree-mingw --parallel 4
          ctest --test-dir build/package-build-tree-mingw --output-on-failure
        shell: bash

      - name: Dual-Config Package Matrix (MinGW)
        # One Ninja Multi-Config tree installs Debug and Release into a single prefix. The dependency archives must
        # coexist without overwrite, and the consumer must select and run each matching configuration.
        run: |
          python scripts/test_check_package_matrix.py
          cmake --preset mingw-multi
          cmake --build --preset mingw-multi-debug --parallel 4
          cmake --build --preset mingw-multi-release --parallel 4
          rm -rf "${{ github.workspace }}/install_matrix/mingw"
          rm -rf "${{ github.workspace }}/install_matrix/mingw-debug-reference"
          cmake --install build/mingw-multi --config Debug --prefix "${{ github.workspace }}/install_matrix/mingw"
          cmake --install build/mingw-multi --config Debug \
            --prefix "${{ github.workspace }}/install_matrix/mingw-debug-reference"
          cmake --install build/mingw-multi --config Release --prefix "${{ github.workspace }}/install_matrix/mingw"
          python scripts/check_install_prefix.py "${{ github.workspace }}/install_matrix/mingw"
          python scripts/check_package_matrix.py "${{ github.workspace }}/install_matrix/mingw" \
            --configs Debug Release \
            --reference-prefix "${{ github.workspace }}/install_matrix/mingw-debug-reference"
          python scripts/check_abi_reject.py "${{ github.workspace }}/install_matrix/mingw" --cxx g++
          cmake -S tests/package_dual_config -B build/package-dual-config-mingw -G "Ninja Multi-Config" \
            -DCMAKE_CXX_COMPILER=g++ \
            -DDetourModKit_DIR="${{ github.workspace }}/install_matrix/mingw/lib/cmake/DetourModKit"
          cmake --build build/package-dual-config-mingw --config Debug --parallel 4
          cmake --build build/package-dual-config-mingw --config Release --parallel 4
          ctest --test-dir build/package-dual-config-mingw -C Debug --output-on-failure
          ctest --test-dir build/package-dual-config-mingw -C Release --output-on-failure
        shell: bash

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml

  # MSVC is the primary shipping toolchain and differs from MinGW in exception handling, /W4 diagnostics, and STL
  # internals. Keep the pull-request gate symmetric so both toolchains compile and run the same debug test preset.
  msvc-build-test:
    name: MSVC Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Set up MSVC developer environment
        # SHA-pinned action that puts cl and the MSVC toolchain on PATH. windows-latest already provides Ninja and
        # CMake.
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: Verify Tools
        run: |
          echo "--- cl ---" && cl 2>&1 | head -1
          echo "--- cmake ---" && cmake --version
          echo "--- ninja ---" && ninja --version
        shell: bash

      - name: Configure (MSVC Debug + Tests, warnings as errors)
        # /WX is part of the blocking gate, and configure runs the source-manifest cross-check.
        run: cmake --preset msvc-debug -DDMK_WARNINGS_AS_ERRORS=ON
        shell: cmd

      - name: Build
        # Cap cl fan-out to avoid C1060 heap exhaustion on the hosted runner.
        run: cmake --build --preset msvc-debug --parallel 2
        shell: cmd

      - name: Run Tests
        # Per-process isolation via CTest, same rationale as the MinGW leg above.
        timeout-minutes: 15
        run: ctest --preset msvc-debug
        shell: cmd

      - name: Build-Tree Consumer Proof (MSVC)
        # Same proof as the MinGW leg; under MSVC Debug it additionally asserts the consumer sits at the debug
        # STL's own iterator-debug level (no exported level-0 pin).
        run: |
          cmake -S tests/package_build_tree -B build/package-build-tree-msvc -G Ninja ^
            -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl ^
            -DDMK_WARNINGS_AS_ERRORS=ON
          if errorlevel 1 exit /b 1
          cmake --build build/package-build-tree-msvc --parallel 2
          if errorlevel 1 exit /b 1
          ctest --test-dir build/package-build-tree-msvc --output-on-failure
        shell: cmd

      - name: Dual-Config Package Matrix (MSVC)
        # The same prefix must serve Debug (/MDd, _ITERATOR_DEBUG_LEVEL=2) and Release (/MD) without cross-linking;
        # a wrong-configuration archive surfaces as LNK2038.
        run: |
          cmake --preset msvc-multi
          if errorlevel 1 exit /b 1
          cmake --build --preset msvc-multi-debug --parallel 2
          if errorlevel 1 exit /b 1
          cmake --build --preset msvc-multi-release --parallel 2
          if errorlevel 1 exit /b 1
          if exist "${{ github.workspace }}\install_matrix\msvc" ^
            rmdir /s /q "${{ github.workspace }}\install_matrix\msvc"
          if exist "${{ github.workspace }}\install_matrix\msvc-debug-reference" ^
            rmdir /s /q "${{ github.workspace }}\install_matrix\msvc-debug-reference"
          cmake --install build/msvc-multi --config Debug --prefix "${{ github.workspace }}/install_matrix/msvc"
          if errorlevel 1 exit /b 1
          cmake --install build/msvc-multi --config Debug ^
            --prefix "${{ github.workspace }}/install_matrix/msvc-debug-reference"
          if errorlevel 1 exit /b 1
          cmake --install build/msvc-multi --config Release --prefix "${{ github.workspace }}/install_matrix/msvc"
          if errorlevel 1 exit /b 1
          python scripts/check_install_prefix.py "${{ github.workspace }}/install_matrix/msvc"
          if errorlevel 1 exit /b 1
          python scripts/check_package_matrix.py "${{ github.workspace }}/install_matrix/msvc" --configs Debug Release ^
            --reference-prefix "${{ github.workspace }}/install_matrix/msvc-debug-reference"
          if errorlevel 1 exit /b 1
          python scripts/check_abi_reject.py "${{ github.workspace }}/install_matrix/msvc" --cxx cl
          if errorlevel 1 exit /b 1
          cmake -S tests/package_dual_config -B build/package-dual-config-msvc -G "Ninja Multi-Config" ^
            -DCMAKE_CXX_COMPILER=cl ^
            -DDetourModKit_DIR="${{ github.workspace }}/install_matrix/msvc/lib/cmake/DetourModKit"
          if errorlevel 1 exit /b 1
          cmake --build build/package-dual-config-msvc --config Debug --parallel 2
          if errorlevel 1 exit /b 1
          cmake --build build/package-dual-config-msvc --config Release --parallel 2
          if errorlevel 1 exit /b 1
          ctest --test-dir build/package-dual-config-msvc -C Debug --output-on-failure
          if errorlevel 1 exit /b 1
          ctest --test-dir build/package-dual-config-msvc -C Release --output-on-failure
        shell: cmd

  system-zydis-package:
    name: System Zydis Package
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Cache MinGW
        id: cache-mingw-system-zydis
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: C:\ProgramData\chocolatey\lib\mingw
          key: ${{ runner.os }}-mingw-13.2.0-v2

      - name: Install MinGW (if not cached)
        if: steps.cache-mingw-system-zydis.outputs.cache-hit != 'true'
        run: choco install mingw --version=13.2.0 --yes --force --no-progress
        shell: powershell

      - name: Add MinGW to PATH
        run: echo "${{ env.MINGW_BIN }}" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Build and install pinned Zydis
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v4.1.0 --recurse-submodules --shallow-submodules \
            https://github.com/zyantific/zydis.git build/system-zydis-src
          test "$(git -C build/system-zydis-src rev-parse HEAD)" = "569320ad3c4856da13b9dbf1f0d9e20bda63870e"
          cmake -S build/system-zydis-src/dependencies/zycore -B build/system-zycore-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_INSTALL_PREFIX="$PWD/build/system-zydis-prefix" \
            -DZYCORE_BUILD_SHARED_LIB=OFF -DZYCORE_BUILD_EXAMPLES=OFF -DZYCORE_BUILD_TESTS=OFF
          cmake --build build/system-zycore-build --parallel 4
          cmake --install build/system-zycore-build
          cmake -S build/system-zydis-src -B build/system-zydis-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_INSTALL_PREFIX="$PWD/build/system-zydis-prefix" \
            -DZYDIS_BUILD_SHARED_LIB=OFF -DZYDIS_BUILD_EXAMPLES=OFF \
            -DZYDIS_BUILD_TOOLS=OFF -DZYDIS_BUILD_DOXYGEN=OFF -DZYDIS_BUILD_TESTS=OFF
          cmake --build build/system-zydis-build --parallel 4
          cmake --install build/system-zydis-build
          test -f build/system-zydis-prefix/lib/cmake/zydis/zydis-config.cmake
          test -f build/system-zydis-prefix/lib/cmake/zycore/zycore-config.cmake
        shell: bash

      - name: Build and consume the system-Zydis package
        run: |
          set -euo pipefail
          cmake -S . -B build/system-zydis-dmk -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_PREFIX_PATH="$PWD/build/system-zydis-prefix" \
            -DCMAKE_INSTALL_PREFIX="$PWD/build/system-zydis-install" \
            -DDMK_BUILD_TESTS=OFF -DSAFETYHOOK_FETCH_ZYDIS=OFF
          grep -q '^SAFETYHOOK_FETCH_ZYDIS:BOOL=OFF$' build/system-zydis-dmk/CMakeCache.txt
          test ! -d build/system-zydis-dmk/_deps/zydis-src
          cmake --build build/system-zydis-dmk --parallel 4
          cmake --install build/system-zydis-dmk
          python scripts/check_install_prefix.py build/system-zydis-install
          cmake -S tests/package_smoke -B build/system-zydis-consumer -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++ \
            -DDetourModKit_DIR="$PWD/build/system-zydis-install/lib/cmake/DetourModKit"
          cmake --build build/system-zydis-consumer --parallel 4
          ctest --test-dir build/system-zydis-consumer --output-on-failure
        shell: bash

  # Both GoogleTest resolution routes must produce the same proof target graph.
  gtest-routes:
    name: GTest route (${{ matrix.route }})
    runs-on: windows-latest
    needs: build-test

    strategy:
      fail-fast: false
      matrix:
        route: [system, fetched]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Cache MinGW
        id: cache-mingw
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: C:\ProgramData\chocolatey\lib\mingw
          key: ${{ runner.os }}-mingw-13.2.0-v2

      - name: Install MinGW (if not cached)
        if: steps.cache-mingw.outputs.cache-hit != 'true'
        run: choco install mingw --version=13.2.0 --yes --force --no-progress
        shell: powershell

      - name: Add MinGW to PATH
        run: echo "${{ env.MINGW_BIN }}" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Provision a system GoogleTest (system route only)
        if: matrix.route == 'system'
        # Build and install the pinned GTest (v1.17.0, the commit tests/CMakeLists.txt would otherwise fetch) into a
        # prefix so find_package(GTest 1.17) resolves it. Keeping the same GTest on both routes isolates the resolution
        # path as the only variable.
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v1.17.0 https://github.com/google/googletest.git gtest-src
          cmake -S gtest-src -B gtest-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug -Dgtest_force_shared_crt=ON -DINSTALL_GTEST=ON \
            -DCMAKE_INSTALL_PREFIX="$PWD/gtest-prefix" \
            -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
          cmake --build gtest-build --parallel 4
          cmake --install gtest-build
        shell: bash

      - name: Configure (route = ${{ matrix.route }})
        run: |
          set -euo pipefail
          if [ "${{ matrix.route }}" = system ]; then
            cmake --preset mingw-debug -DCMAKE_PREFIX_PATH="$PWD/gtest-prefix"
          else
            cmake --preset mingw-debug -DCMAKE_DISABLE_FIND_PACKAGE_GTest=TRUE
          fi
        shell: bash

      - name: Assert the intended route resolved
        run: |
          set -euo pipefail
          if [ "${{ matrix.route }}" = system ]; then
            if [ -d build/mingw-debug/_deps/googletest-src ]; then
              echo "system route: expected find_package to resolve, but FetchContent fell back to a clone" >&2
              exit 1
            fi
            echo "system route OK: find_package(GTest) resolved the provisioned prefix (no FetchContent fallback)"
          else
            if [ ! -d build/mingw-debug/_deps/googletest-src ]; then
              echo "fetched route: expected a FetchContent clone but none is present" >&2
              exit 1
            fi
            echo "fetched route OK: FetchContent googletest-src present"
          fi
        shell: bash

      - name: Build proof targets
        run: >-
          cmake --build build/mingw-debug
          --target fault_tests bootstrap_module_ref profiler_late_uaf dmk_timeout_probe
          --parallel 4
        shell: bash

      - name: Run proof cases (fault, lifecycle, timeout control)
        timeout-minutes: 8
        run: ctest --test-dir build/mingw-debug -L "fault-proof|lifecycle-proof|timeout-control" --output-on-failure
        shell: bash
